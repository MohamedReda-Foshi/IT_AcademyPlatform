name: It_academy

services:
  mongodb:
    image: mongo:latest
    container_name: mern_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"          # ✅ Moved out of environment; added quotes
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_network

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mern_api   # ✅ Added
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      DATAURL: mongodb://mongodb:27017/elearn
      BETTER_AUTH_URL: http://localhost:3000
      FRONT_END_PORT: http://localhost:3000
      BACK_END_PORT: http://localhost:8000
      PORT: 8000
    ports:
      - "5000:8000"
    depends_on:                # ✅ Added
      - mongodb
    networks:                  # ✅ Added
      - mern_network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_EXPRESS_URL: "http://localhost:5000"
    container_name: mern_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_EXPRESS_URL: "http://api:8000"
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - mern_network
volumes:                       # ✅ Added top-level declaration
  mongo_data:

networks:                      # ✅ Added top-level declaration
  mern_network:
    driver: bridge
